        slot: 12
        material: DIAMOND_SWORD
        name: "&cPunish"
      freeze:
        slot: 13
        material: PACKED_ICE
        name: "&cFreeze"
      inspect:
        slot: 14
        material: CHEST
        name: "&cInspect"
      vanish:
        slot: 21
        material: EYE_OF_ENDER
        name: "&cToggle Vanish"
      staffmode:
        slot: 22
        material: COMPASS
        name: "&cStaff Mode"
      notes:
        slot: 15
        material: EMPTY_MAP
        name: "&cNotes"
      modlogs:
        slot: 16
        material: WATCH
        name: "&cMod Logs"
      ranks:
        slot: 23
        material: NAME_TAG
        name: "&cRanks"
      grants:
        slot: 20
        material: GOLD_INGOT
        name: "&6Grant Rank"
      lobby-protection:
        slot: 24
        material: IRON_DOOR
        name: "&cLobby Protection"
      dashboard:
        slot: 25
        material: NETHER_STAR
        name: "&cStaff Dashboard"
      maintenance:
        slot: 29
