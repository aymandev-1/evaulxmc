# Staff tools
staff-tools:
  staff-permission: "evaulx.staff"
  report-cooldown-seconds: 30
  helpop-cooldown-seconds: 15
  max-recent-requests: 50
  clickable-alerts: true
  staff-chat-format: "&8[&bS&8] &8[&f{server}&8] &f{player} &8: &7{message}"
  command-spy:
    enabled: true
    # When false, commands from all players (including staff) are shown to anyone with
    # commandspy enabled. Players without the evaulx.commandspy permission never receive
    # spy output regardless. Sensitive commands below are still hidden for everyone.
    hide-staff-commands: false
    blocked-commands:
      - "login"
      - "register"
      - "changepassword"
      - "password"
    format: "&8[&cCommandSpy&8] &f{player}&8: &7/{command}"
  freeze-message:
    - "&cYou have been frozen by staff."
    - "&7Do not log out. Reason: &f{reason}"
  staffmode-items:
    enabled: true
    clear-inventory: true
    prevent-item-moving: true
    items:
      teleport-compass:
        enabled: true
        slot: 0
        material: COMPASS
        name: "&cTeleport Compass"
        lore: []
      random-teleport:
        enabled: true
        slot: 1
        material: CLOCK
        name: "&cRandom Teleport"
        lore: []
      inspect-player:
        enabled: true
        slot: 3
        material: BLAZE_ROD
        name: "&cInspect Player"
        lore: []
      toggle-vanish:
        enabled: true
        slot: 5
        material: ENDER_EYE
        name: "&cToggle Vanish"
        lore: []
      reports:
        enabled: true
        slot: 7
        material: BOOK
        name: "&cReports"
        lore: []
  staffmode:
    auto-vanish: true
    disable-vanish-on-exit: false
    recovery-snapshots: true
    auto-enable-on-join:
      enabled: false
      ranks: []
      permission: "evaulx.staffmode.autojoin"
  staff-join-leave-alerts:
    enabled: true
    local: true
    network: true
  staff-list:
    network: true
  action-log:
    enabled: true
    max-recent: 200
    write-jsonl: true
  grants:
    expiry-reminder-minutes: 60
  sessions:
    max-recent: 250

