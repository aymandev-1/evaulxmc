# EvaulxMC Configuration
# Core Manager for your Minecraft Server
config-version: 17

# Database type: MONGODB, MYSQL, FLATFILE
database:
  type: FLATFILE

  mongodb:
    host: localhost
    port: 27017
    database: evaulxmc
    username: ""
    password: ""
    auth-database: admin

  mysql:
    host: localhost
    port: 3306
    database: evaulxmc
    username: root
    password: ""
    pool-size: 10

  flatfile:
    # Relative paths are stored inside plugins/EvaulxMC only.
    path: data

# Redis configuration (for multi-server sync)
redis:
  enabled: false
  ip: localhost
  port: 6379

# Third-party compatibility hooks.
hooks:
  vault:
    enabled: true
  luckperms:
    import-on-startup: false

# Server settings
server:
  name: "EvaulxMC"
  network: false
  server-id: "hub"
  proxy: false

# EvaulxMCHub hook
# This keeps nametag/display refreshes owned by EvaulxMCHub when that plugin is installed.
hub-hook:
  enabled: true
  plugin-name: "EvaulxMCHub"
  # Optional fully-qualified service class if EvaulxMCHub registers a Bukkit service.
  # Leave blank to auto-detect services containing "EvaulxMCHub" and "API" or "Service".
  api-service-class: ""
  handles-nametags: true
  refresh-methods:
    - "refreshPlayer"
    - "updatePlayer"
    - "refreshDisplay"
  # Optional fallback command if your hub plugin has no public refresh API.
  # Example: "evaulxmchub refresh {player}"
  refresh-command: ""

# Spawn location; set in-game with /setspawn
spawn:
  world: ""
  x: 0
  y: 0
  z: 0
  yaw: 0
  pitch: 0

# Chat settings
chat:
  format: "{tag}{prefix}{namecolor}{player}{suffix}&7: {message}"
  range: -1  # -1 = global
  filter-enabled: false
  filtered-words: []
  anti-spam:
    enabled: true
    cooldown-seconds: 1.5
    block-repeat: true
    cooldown-message: "&cSlow down before chatting again."
    repeat-message: "&cDo not repeat the same message."
  caps:
    enabled: true
    min-length: 8
    max-percent: 70
  links:
    block: false
    allowed-domains:
      - "evaulx.dev"
    block-message: "&cLinks are not allowed in chat."
  mentions:
    enabled: true
    color: "&c"

# Cosmetic tags used by /tag.
