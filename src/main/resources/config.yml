# Tips (auto-announcements)
tips:
  enabled: true
  interval: 300  # seconds
  messages:
    - "&cEvaulxMC &7┃&fUse &c/help &ffor a list of commands!"
    - "&cEvaulxMC &7┃ &fUse &c/report &fto report a player!"
    - "&cEvaulxMC &7┃ &fVisit our website at &cevaulx.dev"

# Manual broadcast and announcement formats
announcements:
  broadcast-format: "&8[&6Broadcast&8] &f{message}"
  announcement-format: "&8[&cAnnouncement&8] &f{message}"

# Discord webhook
discord:
  enabled: false
  username: "EvaulxMC"
  # Shows the target player's Minecraft head as the embed thumbnail next to each action.
  # {id} = UUID when known, otherwise the name. {uuid} and {name} are also available.
  # mc-heads.net accepts both names and UUIDs; crafatar.com requires a UUID.
  player-head:
    enabled: true
    url: "https://mc-heads.net/avatar/{id}/100"
  webhooks:
    punishments: ""
    rank-changes: ""
    helpop: ""
    reports: ""
    staff-chat: ""
    staff-actions: ""
    system: ""
    security: ""

# Join/Quit messages
join-quit:
  join-message: "&a+ &f{player}"
  quit-message: "&c- &f{player}"
  first-join-message: "&6[NEW] &f{player} &7joined for the first time!"
  enabled: true

# Appeal settings
appeals:
  max-reason-length: 200

# Punishment defaults
punishments:
  default-appeal-status: "not-submitted"
  # URL shown in ban screens. Set to your appeal form, e.g. "yourserver.com/appeal". Leave empty to omit.
  appeal-url: "evaulx.dev/appeal"
  ban-message: |
    &cYou have been banned.
    &7Reason: &f{reason}
    &7Duration: &f{duration}
    &7ID: &f{id}
    &7Appeal at: &f{appeal}
  mute-message: "&cYou are muted. Reason: &f{reason} &cExpires: &f{duration} &7(ID: &f{id}&7)"
  kick-message: |
    &cYou have been kicked.
    &7Reason: &f{reason}
    &7ID: &f{id}
  blacklist-message: |
    &4You have been blacklisted.
    &7Reason: &f{reason}
    &7ID: &f{id}
    &7This is permanent and cannot be appealed.
  warn-threshold: 5
  warn-threshold-action: "tempban {player} 1d Auto-banned for reaching warn limit"

# Preset punishment ladder used by /punish
punishment-presets:
  cheating:
    display-name: "&cCheating"
    material: DIAMOND_SWORD
    lore:
      - "&7Applies the next cheating punishment."
    first: "tempban {player} 7d cheating - first offence"
    second: "tempban {player} 30d cheating - second offence"
    third: "ban {player} cheating - repeated offences"
  chat:
    display-name: "&6Chat Offence"
    material: WRITABLE_BOOK
    lore:
      - "&7Applies the next chat punishment."
    first: "tempmute {player} 1h chat - first offence"
    second: "tempmute {player} 1d chat - second offence"
    third: "mute {player} chat - repeated offences"
  disrespect:
    display-name: "&eDisrespect"
    material: PAPER
    lore:
      - "&7Warn or mute disruptive players."
    first: "warn {player} disrespect - first offence"
    second: "tempmute {player} 6h disrespect - second offence"
    third: "tempmute {player} 3d disrespect - repeated offences"

# Streamer mode (session-only — not persisted to DB)
