    title: "&8Reports"
  helpop:
    title: "&8HelpOP"
  punish:
    title: "&8Punish: {player}"
    title-prefix: "&8Punish: "
  notes:
    title: "&8Notes: {player}"
    title-prefix: "&8Notes: "
  ranks:
    title: "&8Ranks"
  rank-editor:
    title: "&8Rank: {rank}"
  rank-category:
    title: "&8Rank Category: {rank}"
  lobby-protection:
    title: "&8Lobby Protection"
  rank-preset-confirm:
    title: "&8Reset Ranks?"
  staff-dashboard:
    title: "&8Staff Dashboard"
  maintenance:
    title: "&8Maintenance"
  staff-sessions:
    title: "&8Staff Sessions"
