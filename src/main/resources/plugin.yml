name: EvaulxMC
version: 1.0.0
main: dev.evaulx.core.EvaulxCore
description: Core Manager for your Minecraft Server
author: EvaulxMC
website: https://evaulx.dev
api-version: '1.21'

softdepend:
  - PlaceholderAPI
  - Vault
  - LuckPerms
  - EvaulxMCHub
  - ProtocolLib

commands:
  evaulxmc:
    description: Main EvaulxMC command
    aliases: [emc, evaulx]
  ban:
    description: Ban a player
  tempban:
    description: Temporarily ban a player
  ipban:
    description: IP Ban a player
  unban:
    description: Unban a player
  mute:
    description: Mute a player
  tempmute:
    description: Temporarily mute a player
  unmute:
    description: Unmute a player
  kick:
    description: Kick a player
  warn:
    description: Warn a player
  unwarn:
    description: Remove a warning from a player
  blacklist:
    description: Blacklist a player
  unblacklist:
    description: Unblacklist a player
  checkpunishments:
    description: Check punishments of a player
    aliases: [cp, history]
  punish:
    description: Open or run punishment presets
  rank:
    description: Manage ranks
    aliases: [ranks]
  listranks:
    description: List ranks
    aliases: [ranklist]
  rankladder:
    description: View grouped rank hierarchy
    aliases: [rankhierarchy]
  createrank:
    description: Create a rank
    aliases: [rankcreate]
  deleterank:
    description: Delete a rank
    aliases: [delrank, rankdelete]
  rankdisplay:
    description: Set a rank display name
  rankpermission:
    description: Set a rank permission node
  rankprefix:
    description: Set a rank prefix
  ranksuffix:
    description: Set a rank suffix
  rankcolor:
    description: Set a rank color
  ranknamecolor:
    description: Set a rank name color
  rankweight:
    description: Set a rank weight
  rankdefault:
    description: Set the default rank
  rankstaff:
    description: Toggle rank staff status
  rankperm:
    description: Manage rank permissions
    aliases: [rankperms]
  rankinherit:
    description: Manage rank inheritance
    aliases: [rankinherits, rankinheritance]
  rankclone:
    description: Clone a rank
    aliases: [copyrank]
  rankreload:
    description: Reload ranks
  playerrank:
    description: View a player's rank information
  setrank:
    description: Set a player's rank
  addrank:
    description: Add a rank to a player
  removerank:
    description: Remove a rank from a player
  rankinfo:
    description: View rank info
  perm:
    description: Manage permissions
  grant:
    description: Open the grant GUI or grant a temporary/permanent extra rank
  grants:
    description: View rank grants for a player
  removegrant:
    description: Remove an active rank grant
  disguise:
    description: Disguise as another player
    aliases: [dis, nick]
  skin:
    description: Change your disguise skin
    aliases: [nickskin, changeskin]
  undisguise:
    description: Remove your disguise
    aliases: [undis, unnick]
  disguiseinfo:
    description: View disguise info
  realname:
    description: Resolve a disguised player's real name
    aliases: [rn]
  nicklist:
    description: List online disguised players
    aliases: [disguiselist]
  nickhistory:
    description: View disguise history
    aliases: [disguisehistory]
  gamemode:
    description: Change gamemode
    aliases: [gm]
  fly:
    description: Toggle fly mode
  vanish:
    description: Toggle vanish
    aliases: [v]
  staffmode:
    description: Toggle staff mode
    aliases: [sm, staff]
  staffstatus:
    description: View your staff status
    aliases: [sstatus]
  staffchat:
    description: Send or toggle staff chat
    aliases: [sc, staffc]
  commandspy:
    description: Toggle command spy
    aliases: [cmdspy, cspy]
  staffrecover:
    description: Recover staff mode inventory and state
    aliases: [smrecover, staffrestore]
  freeze:
    description: Freeze or unfreeze a player
  unfreeze:
    description: Unfreeze a player
    aliases: [thaw]
  stafflist:
    description: Show online staff
    aliases: [staffonline, slist]
  staffpanel:
    description: Open the staff panel
    aliases: [staffgui, spanel]
  staffdashboard:
    description: Open the staff dashboard
    aliases: [staffdash, sdashboard]
  staffsessions:
    description: View staff session tracking
    aliases: [stafftime, sessions]
  maintenance:
    description: Manage maintenance mode
    aliases: [maint]
  permaudit:
    description: Audit rank and player permissions
    aliases: [permissionaudit, auditperms]
  lookup:
    description: Lookup cached player profile information
    aliases: [playerlookup]
  profile:
    description: Open a staff player profile
    aliases: [playerprofile, pprofile]
  modlogs:
    description: View moderation logs for a player
    aliases: [mlogs, modlog]
  stafflogs:
    description: Search recent staff action logs
    aliases: [slogs, actionlogs]
  note:
    description: Manage staff notes
    aliases: [notes]
  spawn:
    description: Teleport to spawn
  setspawn:
    description: Set the server spawn
  back:
    description: Return to your previous teleport location
  tppos:
    description: Teleport to coordinates
  list:
    description: List online players by rank
    aliases: [online, who]
  sudo:
    description: Force a player to run a command or chat
  announce:
    description: Send or manage announcements
    aliases: [announcement, announcements]
  enchant:
    description: Enchant your held item without level limits
  teleport:
    description: Teleport to a player
    aliases: [tp]
  teleporthere:
    description: Teleport a player to you
    aliases: [tphere]
  teleportall:
    description: Teleport all players to you
    aliases: [tpall]
  feed:
    description: Feed a player
  heal:
    description: Heal a player
  god:
    description: Toggle god mode
  speed:
    description: Set speed
  invsee:
    description: View a player's inventory
  broadcast:
    description: Broadcast a message
    aliases: [bc]
  alert:
    description: Alert the server
  helpop:
    description: Send a message to staff
  report:
    description: Report a player
  reports:
    description: View recent player reports
    aliases: [staffreports]
  msg:
    description: Send a private message
    aliases: [pm, tell, whisper]
  reply:
    description: Reply to a private message
    aliases: [r]
  socialspy:
    description: Toggle social spy
    aliases: [ss]
  mutechat:
    description: Mute the global chat
  clearchat:
    description: Clear the chat
    aliases: [cc]
  nametag:
    description: Refresh EvaulxMC display names
  chatcolor:
    description: Set your chat color
    aliases: [chatcolour]
  namecolor:
    description: Set your name color
    aliases: [namecolour]
  tag:
    description: List, preview, set, clear, or randomize your chat tag
    aliases: [tags, taglist]
  buildmode:
    description: Toggle lobby build bypass mode
    aliases: [build, bm]
  lobbyprotect:
    description: Manage and enforce lobby protection
    aliases: [lobbyprotection, protectlobby, lp]

