name: EvaulxMC
version: 1.0.0
main: dev.evaulx.core.EvaulxCore
description: Core Manager for your Minecraft Server
author: EvaulxMC
website: https://evaulx.dev

softdepend:
  - PlaceholderAPI
  - Vault
  - LuckPerms
  - EvaulxMCHub
  - ProtocolLib

commands:
  evaulxmc:
    description: Main EvaulxMC command
    aliases: [emc, evaulx]
  ban:
    description: Ban a player
  tempban:
    description: Temporarily ban a player
  ipban:
    description: IP Ban a player
  unban:
    description: Unban a player
  mute:
    description: Mute a player
  tempmute:
    description: Temporarily mute a player
  unmute:
    description: Unmute a player
  kick:
    description: Kick a player
  warn:
    description: Warn a player
  unwarn:
    description: Remove a warning from a player
  blacklist:
    description: Blacklist a player
  unblacklist:
    description: Unblacklist a player
  checkpunishments:
    description: Check punishments of a player
    aliases: [cp, history]
  punish:
    description: Open or run punishment presets
  alts:
    description: Find alternate accounts linked by IP
  evidence:
    description: Attach or clear evidence on a punishment
    aliases: [setevidence]
  rank:
    description: Manage ranks
    aliases: [ranks]
  listranks:
    description: List ranks
    aliases: [ranklist]
  rankladder:
    description: View grouped rank hierarchy
    aliases: [rankhierarchy]
  createrank:
    description: Create a rank
    aliases: [rankcreate]
  deleterank:
    description: Delete a rank
    aliases: [delrank, rankdelete]
  rankdisplay:
    description: Set a rank display name
  rankpermission:
    description: Set a rank permission node
  rankprefix:
    description: Set a rank prefix
  ranksuffix:
    description: Set a rank suffix
  rankcolor:
    description: Set a rank color
  ranknamecolor:
    description: Set a rank name color
  rankweight:
    description: Set a rank weight
  rankdefault:
    description: Set the default rank
  rankstaff:
    description: Toggle rank staff status
  rankperm:
    description: Manage rank permissions
    aliases: [rankperms]
  rankinherit:
    description: Manage rank inheritance
    aliases: [rankinherits, rankinheritance]
  rankclone:
    description: Clone a rank
    aliases: [copyrank]
  rankreload:
    description: Reload ranks
  playerrank:
    description: View a player's rank information
  setrank:
    description: Set a player's rank
  addrank:
    description: Add a rank to a player
  removerank:
    description: Remove a rank from a player
  rankinfo:
    description: View rank info
  perm:
    description: Manage permissions
  grant:
    description: Open the grant GUI or grant a temporary/permanent extra rank
  grants:
    description: View rank grants for a player
  removegrant:
    description: Remove an active rank grant
  disguise:
    description: Disguise as another player
    aliases: [dis]
  skin:
    description: Change your disguise skin
    aliases: [nickskin, changeskin]
  undisguise:
    description: Remove your disguise
    aliases: [undis, unnick]
  disguiseinfo:
    description: View disguise info
  realname:
    description: Resolve a disguised player's real name
    aliases: [rn]
  nicklist:
    description: List online disguised players
    aliases: [disguiselist]
  nickhistory:
    description: View disguise history
    aliases: [disguisehistory]
  forcedisguise:
    description: Force-disguise another player
    aliases: [fnick, forcenick]
  disguisecooldown:
    description: Check or reset a player's disguise cooldown
    aliases: [nickcooldown, dcooldown]
  nickcolor:
    description: Change your disguise name color while disguised
    aliases: [disguisecolor, nickcolour]
  gamemode:
    description: Change gamemode
    aliases: [gm]
  fly:
    description: Toggle fly mode
  vanish:
    description: Toggle vanish
    aliases: [v]
  staffmode:
    description: Toggle staff mode
    aliases: [sm, staff]
  staffstatus:
    description: View your staff status
    aliases: [sstatus]
  staffchat:
    description: Send or toggle staff chat
    aliases: [sc, staffc]
  commandspy:
    description: Toggle command spy
    aliases: [cmdspy, cspy]
  staffrecover:
    description: Recover staff mode inventory and state
    aliases: [smrecover, staffrestore]
  freeze:
    description: Freeze or unfreeze a player
  unfreeze:
    description: Unfreeze a player
    aliases: [thaw]
  stafflist:
    description: Show online staff
    aliases: [staffonline, slist]
  staffpanel:
    description: Open the staff panel
    aliases: [staffgui, spanel]
  staffdashboard:
    description: Open the staff dashboard
    aliases: [staffdash, sdashboard]
  staffsessions:
    description: View staff session tracking
    aliases: [stafftime, sessions]
  maintenance:
    description: Manage maintenance mode
    aliases: [maint]
  permaudit:
    description: Audit rank and player permissions
    aliases: [permissionaudit, auditperms]
  lookup:
    description: Lookup cached player profile information
    aliases: [playerlookup]
  profile:
    description: Open a staff player profile
    aliases: [playerprofile, pprofile]
  modlogs:
    description: View moderation logs for a player
    aliases: [mlogs, modlog]
  stafflogs:
    description: Search recent staff action logs
    aliases: [slogs, actionlogs]
  note:
    description: Manage staff notes
    aliases: [notes]
  spawn:
    description: Teleport to spawn
  setspawn:
    description: Set the server spawn
  back:
    description: Return to your previous teleport location
  tppos:
    description: Teleport to coordinates
  list:
    description: List online players by rank
    aliases: [online, who]
  sudo:
    description: Force a player to run a command or chat
  announce:
    description: Send or manage announcements
    aliases: [announcement, announcements]
  enchant:
    description: Enchant your held item without level limits
  teleport:
    description: Teleport to a player
    aliases: [tp]
  teleporthere:
    description: Teleport a player to you
    aliases: [tphere]
  teleportall:
    description: Teleport all players to you
    aliases: [tpall]
  feed:
    description: Feed a player
  heal:
    description: Heal a player
  god:
    description: Toggle god mode
  speed:
    description: Set speed
  invsee:
    description: View a player's inventory
  broadcast:
    description: Broadcast a message
    aliases: [bc]
  alert:
    description: Alert the server
  helpop:
    description: Send a message to staff
  report:
    description: Report a player
  reports:
    description: View recent player reports
    aliases: [staffreports]
  msg:
    description: Send a private message
    aliases: [pm, tell, whisper]
  reply:
    description: Reply to a private message
    aliases: [r]
  socialspy:
    description: Toggle social spy
    aliases: [ss]
  mutechat:
    description: Mute the global chat
  clearchat:
    description: Clear the chat
    aliases: [cc]
  nametag:
    description: Refresh EvaulxMC display names
  chatcolor:
    description: Set your chat color
    aliases: [chatcolour]
  namecolor:
    description: Set your name color
    aliases: [namecolour]
  tag:
    description: List, preview, set, clear, or randomize your chat tag
    aliases: [tags, taglist]
  buildmode:
    description: Toggle lobby build bypass mode
    aliases: [build, bm]
  lobbyprotect:
    description: Manage and enforce lobby protection
    aliases: [lobbyprotection, protectlobby, lp]
  afk:
    description: Toggle your AFK status
    aliases: [away]
  msgtoggle:
    description: Toggle whether you receive private messages
    aliases: [msgt, togglemsg]
  ignore:
    description: Toggle ignoring private messages from a player
  hat:
    description: Wear your held item as a helmet
  kickall:
    description: Kick all non-exempt players from the server
  time:
    description: Set world time
  weather:
    description: Set world weather
    aliases: [sky]
  nick:
    description: Set or remove your nickname
    aliases: [nickname]
  seen:
    description: Check when a player was last online
  repair:
    description: Repair held item or all items in inventory
  more:
    description: Fill your held item stack to maximum
  clearinv:
    description: Clear a player's inventory
    aliases: [clear, ci]
  appeal:
    description: Submit or manage ban/mute appeals
  creator:
    description: Manage content creator profiles and status
    aliases: [contentcreator, creators]
  redeemcode:
    description: Redeem a content creator subscriber code for rewards
    aliases: [redeem]
  shoutout:
    description: Content creator shoutout to a fan
    aliases: [so]
  cchat:
    description: Send a message in the content creator private channel
    aliases: [ccchat]
  golive:
    description: Announce you are going live on your stream
    aliases: [live, startstream]
  offair:
    description: Announce you have ended your stream
    aliases: [endstream, stoplive]
  ccgiveaway:
    description: Run a random giveaway for online players as a content creator
    aliases: [ccga, creatorga]
  milestone:
    description: Broadcast a content creator milestone to the server
  socials:
    description: Broadcast your social links and stream info to the server
  lockdown:
    description: Toggle server lockdown to prevent new players joining
  tempfly:
    description: Grant a player temporary fly for a specified duration
    aliases: [tfly]
  craft:
    description: Open a workbench anywhere
    aliases: [workbench, wb]
  ec:
    description: Open your ender chest or view another player's ender chest
    aliases: [enderchest]
  globalfly:
    description: Toggle fly mode for all online players
    aliases: [gfly]
  ownerbc:
    description: Send a special owner-styled broadcast with sound
    aliases: [ownerbroadcast, obc]
  servermsg:
    description: Set or clear a persistent message shown to players on join
    aliases: [joinmsg, servermessage]
  resetrank:
    description: Remove all active grants and reset a player to their default rank
    aliases: [rankreset]
  streamermode:
    description: Toggle streamer mode to hide your real name in chat and tab
    aliases: [streammode]
  ping:
    description: Check a player's connection ping
  ipcheck:
    description: Check a player's stored IP address and online alts
    aliases: [checkip]
  playtime:
    description: View how long a player has been on the server
  whois:
    description: View detailed player info, rank, punishments, and flags
    aliases: [playerinfo, pinfo]
  owneralert:
    description: Send a dramatic owner alert to all players
    aliases: [oalert]
  serverfreeze:
    description: Freeze or unfreeze all non-staff players server-wide
    aliases: [sfreeze, freezeall]
  forcechat:
    description: Force a player to say something in chat
    aliases: [fc]
  devmode:
    description: Toggle developer creative mode with enhanced tools
    aliases: [dev]
  reloadplugin:
    description: Reload the EvaulxMC plugin configuration
    aliases: [plreload, evaulxreload]
  testeffect:
    description: Apply a potion effect to yourself for testing
    aliases: [teffect]
  devbroadcast:
    description: Broadcast a developer announcement to all players
    aliases: [devbc]
  builderannounce:
    description: Send a builder announcement to all players
    aliases: [bannounce, ba]
  nightvision:
    description: Toggle night vision on yourself or another player
    aliases: [nv, nightvis]
  hideall:
    description: Hide or show all other players from your view
    aliases: [hideplayers]
  head:
    description: Get a player head item
    aliases: [playerhead, skull]
  ccannounce:
    description: Send a content creator style announcement to all players
    aliases: [creatorannounce]
  watchparty:
    description: Start or end a watch party event for your stream
    aliases: [wp]
  particles:
    description: Toggle a particle effect that follows you
    aliases: [particle, pe]
  home:
    description: Teleport to one of your saved homes
    aliases: [h]
  sethome:
    description: Set a home at your current location
    aliases: [homeset]
  delhome:
    description: Delete a saved home
    aliases: [deletehome, removehome]
  homes:
    description: List all your saved homes
  warp:
    description: Teleport to a server warp
  setwarp:
    description: Create or update a server warp
    aliases: [createwarp]
  delwarp:
    description: Delete a server warp
    aliases: [deletewarp, removewarp]
  warps:
    description: List all available server warps
  tpa:
    description: Request to teleport to a player
  tpahere:
    description: Request a player to teleport to you
  tpaccept:
    description: Accept a pending teleport request
    aliases: [tpyes]
  tpdeny:
    description: Deny a pending teleport request
    aliases: [tpno]
  rename:
    description: Rename your held item
    aliases: [itemname]
  lore:
    description: Edit the lore lines of your held item
    aliases: [itemlore]
  glow:
    description: Toggle an enchantment glow effect on your held item
  tps:
    description: View server TPS, RAM usage and uptime
  serverinfo:
    description: View detailed server information
    aliases: [sinfo, si]
  coins:
    description: View your coin balance or manage another player's coins
    aliases: [balance, bal]
  pay:
    description: Send coins to another player
  daily:
    description: Claim your daily coin reward
    aliases: [dailyreward]
  friend:
    description: Manage your friends list
    aliases: [friends, f]
  mail:
    description: Send and read offline player mail
  ext:
    description: Extinguish a player who is on fire
    aliases: [extinguish]
  near:
    description: Show nearby players within a radius
    aliases: [nearby]
  smite:
    description: Strike a player with lightning
    aliases: [lightning]
  coords:
    description: Display your current coordinates and facing direction
    aliases: [pos, position, loc]
  party:
    description: Create and manage a party with other players
    aliases: [p]
  fm:
    description: Send a quick message to a friend
    aliases: [friendmsg, fmsg]

